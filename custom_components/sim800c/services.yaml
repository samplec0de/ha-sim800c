send_sms:
  name: Send SMS
  description: Send an SMS message via the SIM800C module.
  fields:
    target:
      name: Target
      description: Phone number(s) in international format (+7...).
      required: true
      example: "+79990001122"
      selector:
        text:
    message:
      name: Message
      description: Message text (Cyrillic and other Unicode supported).
      required: true
      example: "Привет!"
      selector:
        text:
          multiline: true
    force_unicode:
      name: Force Unicode
      description: Always send as UCS2 even if the text fits GSM 7-bit.
      required: false
      default: false
      selector:
        boolean:

call:
  name: Call
  description: >-
    Place a voice call to a number and automatically hang up after it rings.
    Returns whether the call was answered. No audio is played.
  fields:
    target:
      name: Target
      description: Phone number in international format (+7...).
      required: true
      example: "+79990001122"
      selector:
        text:
    ring_duration:
      name: Ring duration
      description: >-
        Seconds to let the call ring before hanging up (1-120). The call also
        ends early if the other party answers or hangs up.
      required: false
      default: 30
      selector:
        number:
          min: 1
          max: 120
          unit_of_measurement: s
          mode: box

call_and_play:
  name: Call and play audio
  description: >-
    Place a voice call and play a pre-made AMR-NB audio clip into it so the
    callee hears it, then automatically hang up. The audio file must be
    AMR-NB (8 kHz mono).
  fields:
    target:
      name: Target
      description: Phone number in international format (+7...).
      required: true
      example: "+79990001122"
      selector:
        text:
    audio_file:
      name: Audio file
      description: >-
        Path to a local AMR-NB file readable by Home Assistant (must be under
        an allowlisted directory).
      required: true
      example: "/media/sim800c/alert.amr"
      selector:
        text:
    duration:
      name: Clip duration
      description: >-
        Known length of the clip in seconds, used to hold the call while it
        plays. If omitted, playback is watched until the call drops or a 60s cap.
      required: false
      example: 5
      selector:
        number:
          min: 0
          max: 120
          unit_of_measurement: s
          mode: box
    ring_duration:
      name: Ring duration
      description: >-
        Seconds to let the call ring before giving up (1-120). The clip is only
        played if the call is answered within this window.
      required: false
      default: 30
      selector:
        number:
          min: 1
          max: 120
          unit_of_measurement: s
          mode: box
    volume:
      name: Volume
      description: Playback volume (0-100).
      required: false
      default: 90
      selector:
        number:
          min: 0
          max: 100
          mode: slider

hang_up:
  name: Hang up
  description: Hang up the current call, if any.
