# The contents of this file is based on https://github.com/home-assistant/core/blob/dev/pyproject.toml

target-version = "py313"

[lint]
select = [
    "ALL",
]

ignore = [
    "ANN401", # Dynamically typed expressions (typing.Any) are disallowed
    "D203", # no-blank-line-before-class (incompatible with formatter)
    "D212", # multi-line-summary-first-line (incompatible with formatter)
    "COM812", # incompatible with formatter
    "ISC001", # incompatible with formatter
]

[lint.per-file-ignores]
# CLI harness intentionally prints to stdout for a human operator.
"scripts/modem_harness.py" = ["T201"]
# Test files: asserts are the point of the test, docstrings/annotations on every
# test function add noise without value, magic numbers in assertions are the
# expected values under test, and unused fixture/lambda args are standard
# pytest/test-double idioms.
"tests/**/*.py" = [
    "S101",    # assert is the point of a test
    "D100",    # module docstrings aren't needed for every test file
    "D103",    # function docstrings aren't needed for every test function
    "ANN001",  # test function args (fixtures) don't need type annotations
    "ANN201",  # test functions don't need return type annotations
    "PLR2004", # magic values are the expected values under test
    "ARG",     # unused fixture args (HA fixture-dependency pattern) / lambda test-double args
]

[lint.flake8-pytest-style]
fixture-parentheses = false

[lint.pyupgrade]
keep-runtime-typing = true

[lint.mccabe]
max-complexity = 25
